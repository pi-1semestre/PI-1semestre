<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoio Pet - Novas Histórias</title>
    <!-- CSS da página -->
    <link rel="stylesheet" href="./assets/css/novas_historias.css">
    <link rel="icon" href="./assets/imgs/logo_guia.png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar-admin">
        <div class="logo-container">
            <img src="./assets/imgs/Logo.png" alt="Logo Apoio Pet" class="logo-img"> 
        </div>
        <button class="menu-mobile" id="btnMenu" aria-label="Abrir menu">☰</button>
        <div class="fundo-menu" id="fundoMenu"></div>
        <nav class="nav-links" id="menu">
            <button class="fechar-menu" id="fecharMenu" aria-label="Fechar menu">×</button>
            <a href="novas_historias.html" class="active">Novas Histórias</a>
            <a href="cadastro_animal.html">Cadastrar</a>
            <a href="animais_cadastrados.html">Animais Cadastrados</a>
            <a href="login_adm.html">Login</a>
        </nav>
    </header>

    <main class="main-container">
        <div class="topo-pagina">
            <div class="titulo-esquerda">
                <a href="javascript:history.back()" class="btn-voltar-circulo" aria-label="Voltar">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="white"/>
                    </svg>
                </a>
                <h1>Nova História</h1>
            </div>
            <div class="toggle-container">
                <span>Todas</span>
                <label class="switch">
                    <input type="checkbox" id="toggleTodas">
                    <span class="slider round"></span>
                </label>
            </div>
        </div>
        
        <!-- O grid onde as histórias serão inseridas pelo JS -->
        <div class="historias-grid" id="historias-grid">
            <p>Carregando histórias...</p>
        </div>
    </main>

    <!-- Script correto para esta página -->
    <script src="./assets/script/novas_historias.js"></script>
</body>
</html>
