<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apoio Pet - Quero Adotar!</title>
    <link rel="stylesheet" href="./assets/css/adocao.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="top-bar-decorator"></div>
    <div class="faixa-topo">
        <div class="faixa-amarela"></div>
        <div class="faixa-verde"></div>
        <div class="faixa-vermelha"></div>
    </div>

    <header class="cabecalho">
        <img src="./assets/imgs/Logo.png" alt="Apoio Pet" class="logo">
        <button class="menu-mobile" id="btnMenu" aria-label="Abrir menu">☰</button>
        <div class="fundo-menu" id="fundoMenu"></div>
        <nav class="menu" id="menu">
            <button class="fechar-menu" id="fecharMenu" aria-label="Fechar menu">×</button>
            <a href="index.html">Início</a>
            <a href="sobre_nos.html">Sobre Nós</a>
            <a href="casos.html">Casos</a>
            <a href="denuncia.html">Denúncia</a>
            <a href="contato.html">Contato</a>
            <a href="como_ajudar.html" class="btn-ajuda">Como ajudar</a>
        </nav>
    </header>

    <section class="hero-section">
        <h1>Quero adotar!</h1>
        <div class="search-container">
            <div class="checkbox-group">
                <label class="custom-checkbox">
                    <input type="checkbox" id="check-gato">
                    <span class="checkmark"></span> Gato
                </label>
                <label class="custom-checkbox">
                    <input type="checkbox" id="check-cachorro">
                    <span class="checkmark"></span> Cachorro
                </label>
            </div>
            
            <select id="filtro-porte" class="input-filtro">
                <option value="">Porte (Todos)</option>
                <option value="Pequeno">Pequeno</option>
                <option value="Medio">Médio</option>
                <option value="Grande">Grande</option>
            </select>
            <select id="filtro-pelagem" class="input-filtro">
                <option value="">Pelagem (Todas)</option>
                <option value="Curta">Curta</option>
                <option value="Longa">Longa</option>
            </select>
            <select id="filtro-sexo" class="input-filtro">
                <option value="">Sexo (Todos)</option>
                <option value="Macho">Macho</option>
                <option value="Femea">Fêmea</option>
            </select>

            <button class="btn-search" id="btnFiltrar">Procure um amiguinho</button>
        </div>
    </section>

    <main class="main-content">
        <div id="pets-grid" class="pets-grid">
            <div class="loading">Carregando amiguinhos...</div>
        </div>
    </main>

    <footer class="rodape">
        <div class="rodape-grid">
            <div class="rodape-coluna">
                <h3>Onde estamos</h3>
                <div class="mapa"><iframe src="https://www.google.com/maps?q=R.%20Arno%20Waldemar%20D%C3%B6hler,%20957%20-%20Zona%20Industrial%20Norte,%20Joinville%20-%20SC,%2089219-510&output=embed" loading="lazy"></iframe></div>
            </div>
            <div class="rodape-coluna">
                <h3>Fale conosco</h3>
                <a href="tel:08000481212" class="rodape-botao"><img src="./assets/imgs/adocao_imagem/Telefone.png" alt="Telefone"> 0800-048-1212</a>
                <a href="https://wa.me/554832314000" class="rodape-botao"><img src="./assets/imgs/adocao_imagem/WhatsApp.png" alt="WhatsApp"> (48) 3231-4000</a>
            </div>
            <div class="rodape-coluna ajuda">
                <h3>Como ajudar</h3>
                <a href="#" class="rodape-botao"><img src="./assets/imgs/adocao_imagem/Pix.png" alt="Pix"> Pix</a>
                <a href="./formulario.html" class="rodape-botao"><img src="./assets/imgs/adocao_imagem/Pessoa.png" alt="Pessoa"> Seja voluntário</a>
            </div>
        </div>
        <p class="copy">© 2026 Apoio Pet. Todos os direitos reservados.</p>
    </footer>

    <script>
        // Menu lógico (Inalterado)
        const btnMenu = document.getElementById("btnMenu");
        const fecharMenu = document.getElementById("fecharMenu");
        const menu = document.getElementById("menu");
        const fundoMenu = document.getElementById("fundoMenu");
        btnMenu.addEventListener("click", () => { menu.classList.add("ativo"); fundoMenu.classList.add("ativo"); });
        fecharMenu.addEventListener("click", () => { menu.classList.remove("ativo"); fundoMenu.classList.remove("ativo"); });
        fundoMenu.addEventListener("click", () => { menu.classList.remove("ativo"); fundoMenu.classList.remove("ativo"); });
    </script>
    <script src="adocao.js"></script>
</body>
</html>
