<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Login ApoioPet</title>

    <link rel="stylesheet" href="./assets/css/login_adm.css">
</head>

<body>

    <main>
        <section>

            <!-- Logo ApoioPet -->
            <img src="./assets/imgs/logo_login.png" alt="ApoioPet" class="logo">
            <p>Login Administrador</p>

            <form id="formLogin">

                <div class="campo">
                    <label for="email">E-mail:</label>

                    <input type="email" id="emailAdm" placeholder="seuemail@gmail.com">
                </div>

                <div class="campo">
                    <label for="senha">Senha:</label>

                    <div class="senha-box">

                        <input type="password" id="senha" placeholder="">

                    </div>
                </div>

                <button type="submit" class="btn-login">
                    Entrar
                </button>

            </form>

        </section>
    </main>

    <script src="./assets/script/login.js"></script>

</body>

</html>
