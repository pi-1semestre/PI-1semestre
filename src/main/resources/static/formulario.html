<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seja um Voluntário</title>
    <link rel="stylesheet" href="./assets/css/formulario.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <section class="voluntario">
        <div class="titulo">
            <h1>
                <img src="./assets/imgs/mao-adocao.png" alt="">
                Faça a diferença
            </h1>

            <h2>Seja um voluntário</h2>

            <p>
                Preencha o formulário abaixo e junte-se a nós nessa causa.
            </p>
        </div>

        <div class="form-container">
            <form id="formCadastro">
                <div class="campo">
                    <label for="nome">Nome completo</label>
                    <input
                        type="text"
                        id="nome"
                        placeholder="Digite seu nome"
                    >
                </div>

                <div class="campo">
                    <label for="idade">Idade</label>
                    <input
                        type="number"
                        id="idade"
                        placeholder="Digite sua idade"
                    >
                </div>

                <div class="campo">
                    <label for="email">Email</label>
                    <input
                        type="email"
                        id="email"
                        placeholder="Digite seu e-mail"
                    >
                </div>

                <button type="submit">
                    Quero participar
                    <img src="./assets/imgs/pata-formulario.png" alt="">
                </button>
            </form>
        </div>
    </section>

    <script src="./assets/script/formulario.js"></script>

</body>
</html>
