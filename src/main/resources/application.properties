spring.application.name=db_animal

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/db_animal?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=12345
server.port=8081

# ================================================================
# DATABASE SCHEMA & SEEDING (single-file complete fix)
# ================================================================
# ROOT CAUSES:
# 1. mode=never blocks data.sql execution entirely
# 2. Hibernate schema defaults to 'undefined' for MySQL
#    causing silent initializer failures
#
# FIX: Explicit schema + mode=always (TEMPORARY for reseed only)
# ================================================================
spring.jpa.defer-datasource-initialization=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.default_schema=db_animal
spring.jpa.open-in-view=false


spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.continue-on-error=false